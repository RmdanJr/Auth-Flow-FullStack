# Render Blueprint — connect repo at https://dashboard.render.com/blueprints
# Auto-deploys on every push to main after linking this repository.

services:
  - type: web
    name: auth-flow-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/docs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: auth-flow-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: auth-flow-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    rootDir: frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: auth-flow-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
