name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-flow-backend:latest
            ${{ env.IMAGE_PREFIX }}/auth-flow-backend:${{ github.event.workflow_run.head_sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-flow-frontend:latest
            ${{ env.IMAGE_PREFIX }}/auth-flow-frontend:${{ github.event.workflow_run.head_sha }}

      - name: Deploy backend to Render
        if: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Deploy frontend to Render
        if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        uses: bervProject/railway-deploy@v1.2.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ vars.RAILWAY_SERVICE_ID }}
