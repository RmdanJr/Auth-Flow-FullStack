name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Unit tests with coverage
        working-directory: backend
        run: npm run test:cov

      - name: E2E tests
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: ci-test-secret
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: test
        run: npm run test:e2e

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run build

  sonarcloud:
    name: sonarcloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    environment: SONAR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-backend:
    name: deploy-backend
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    if: github.event_name == 'push'
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-flow-backend:latest
            ${{ env.IMAGE_PREFIX }}/auth-flow-backend:${{ github.sha }}

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy backend to Fly.io
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
        run: flyctl deploy --remote-only --app auth-flow-api

      - name: Verify backend health
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://auth-flow-api.fly.dev/api/docs)
            if [ "$status" = "200" ]; then
              echo "Backend healthy (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — waiting for cold start..."
            sleep 10
          done
          echo "Backend did not become healthy in time"
          exit 1

  deploy-frontend:
    name: deploy-frontend
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    if: github.event_name == 'push'
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          build-args: |
            VITE_API_URL=https://auth-flow-api.fly.dev
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-flow-frontend:latest
            ${{ env.IMAGE_PREFIX }}/auth-flow-frontend:${{ github.sha }}

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy frontend to Fly.io
        working-directory: frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WEB }}
        run: |
          flyctl deploy --remote-only --app auth-flow-web \
            --build-arg VITE_API_URL=https://auth-flow-api.fly.dev

      - name: Sync backend CORS origin
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}
        run: flyctl secrets set FRONTEND_URL=https://auth-flow-web.fly.dev --app auth-flow-api

      - name: Verify frontend health
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://auth-flow-web.fly.dev/)
            if [ "$status" = "200" ]; then
              echo "Frontend healthy (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — waiting for cold start..."
            sleep 10
          done
          echo "Frontend did not become healthy in time"
          exit 1
