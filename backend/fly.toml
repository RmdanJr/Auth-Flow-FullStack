# fly.toml — backend API on Fly.io free tier
# Run once locally: cd backend && fly launch --no-deploy

app = 'auth-flow-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  JWT_EXPIRES_IN = '1d'
